name: CI
# NOT a full build! Just smoke testing script integrity

on:
  workflow_dispatch:
  push:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check shell scripts are executable
      run: |
        bad=()
        while IFS= read -r f; do
          test -x "$f" || bad+=("$f")
        done < <(find . -name '*.sh')
        if (( ${#bad[@]} )); then
          printf 'NOT executable: %s\n' "${bad[@]}"
          exit 1
        fi

    - name: Check config helper cache path
      run: |
        mkdir -p build
        cd build
        NO_SAVANNAH=1 ../utils/get-config-scripts.sh
        test -s ../archives/config.guess
        test -s ../archives/config.sub

    - name: Check no direct Savannah config downloads remain
      run: |
        ! grep -R "git.savannah.gnu.org.*config\.\(guess\|sub\)" -n scripts depends